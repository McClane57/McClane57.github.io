<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Журнал · Powerlifting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
/* =========================================================
   Design system — OLED-black Linear/Vercel style, red accent
   ========================================================= */
:root,[data-theme="dark"]{
  --bg:#000;
  --bg-1:#080808;
  --bg-2:#0e0e10;
  --bg-3:#141417;
  --line:#1d1d20;
  --line-2:#2a2a2e;
  --fg:#f5f5f7;
  --fg-2:#a1a1a6;
  --fg-3:#6e6e73;
  --fg-4:#48484d;
  --accent:#ff4d2e;       /* red-orange */
  --accent-2:#ff7a45;
  --accent-soft:rgba(255,77,46,.14);
  --ok:#30d158;
  --warn:#ffb340;
  --bad:#ff453a;
  /* lifts */
  --squat:#ffb340;
  --bench:#ff4d2e;
  --dead:#bf5af2;
  --shadow-sm:0 1px 2px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --radius:10px;
  --radius-lg:14px;
}
[data-theme="light"]{
  --bg:#fafafa;
  --bg-1:#fff;
  --bg-2:#f4f4f5;
  --bg-3:#ececef;
  --line:#e5e5e8;
  --line-2:#d4d4d8;
  --fg:#09090b;
  --fg-2:#3f3f46;
  --fg-3:#71717a;
  --fg-4:#a1a1aa;
  --accent-soft:rgba(255,77,46,.12);
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.08);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--bg);-webkit-font-smoothing:antialiased}
body{
  background:var(--bg);color:var(--fg);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:14px;line-height:1.5;font-feature-settings:'cv11','ss01','ss03';
  min-height:100vh;overflow-x:hidden;
}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:'zero'}
button{font-family:inherit}

/* ================ layout shell ================ */
.app{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}
@media(max-width:900px){
  .app{grid-template-columns:1fr;padding-bottom:68px}
}

/* ---------- Sidebar (desktop) ---------- */
.sidebar{
  border-right:1px solid var(--line);
  background:var(--bg);
  padding:18px 12px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:0;height:100vh;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px 16px;
}
.brand-mark{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px;
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;
}
.brand-name{font-weight:700;font-size:14px;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:var(--fg-3);margin-top:-2px}
.nav-group-label{
  font-size:10px;font-weight:600;color:var(--fg-3);
  text-transform:uppercase;letter-spacing:.08em;
  padding:14px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:7px;
  color:var(--fg-2);cursor:pointer;
  font-size:13px;font-weight:500;
  border:none;background:transparent;width:100%;text-align:left;
  transition:background .1s,color .1s;
}
.nav-item:hover{background:var(--bg-2);color:var(--fg)}
.nav-item.active{background:var(--bg-2);color:var(--fg)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{width:16px;height:16px;color:var(--fg-3);flex-shrink:0}
.nav-kbd{
  margin-left:auto;font-size:10px;color:var(--fg-4);
  font-family:'JetBrains Mono',monospace;
}
.sidebar-footer{
  margin-top:auto;padding:10px 6px 4px;
  border-top:1px solid var(--line);
}
.profile-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:7px;cursor:pointer;
}
.profile-chip:hover{background:var(--bg-2)}
.avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#ff4d2e,#bf5af2);
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;
  flex-shrink:0;
}
.profile-chip .name{font-size:12px;font-weight:600}
.profile-chip .role{font-size:11px;color:var(--fg-3)}

/* ---------- Main content area ---------- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  height:52px;padding:0 28px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);
  z-index:50;
}
[data-theme="light"] .topbar{background:rgba(250,250,250,.72)}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-3);min-width:0}
.crumbs .sep{color:var(--fg-4)}
.crumbs .leaf{color:var(--fg);font-weight:500}
.topbar-spacer{flex:1}
.search-btn{
  display:flex;align-items:center;gap:8px;
  padding:5px 10px;border:1px solid var(--line);border-radius:7px;
  background:var(--bg);color:var(--fg-3);cursor:pointer;font-size:12px;
}
.search-btn:hover{border-color:var(--line-2);color:var(--fg)}
.search-btn .kbd{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:1px 5px;border:1px solid var(--line-2);border-radius:4px;
  background:var(--bg-2);
}
.icon-btn{
  width:30px;height:30px;border-radius:7px;border:1px solid var(--line);
  background:var(--bg);color:var(--fg-2);cursor:pointer;
  display:grid;place-items:center;
}
.icon-btn:hover{border-color:var(--line-2);color:var(--fg);background:var(--bg-2)}
.icon-btn svg{width:14px;height:14px}

.content{padding:28px;flex:1;max-width:1280px;width:100%;margin:0 auto}
@media(max-width:900px){
  .content{padding:16px}
  .topbar{padding:0 16px}
}

/* ---------- Section pages ---------- */
.page{display:none}
.page.active{display:block;animation:pageIn .18s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.page-head{margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0}
.page-sub{color:var(--fg-3);font-size:13px;margin-top:4px}

/* ---------- Cards ---------- */
.card{
  background:var(--bg-1);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px;
  transition:border-color .12s;
}
.card:hover{border-color:var(--line-2)}
.card.flush{padding:0;overflow:hidden}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:14px;
}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.005em}
.card-sub{font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* ---------- Grid layout for dashboard ---------- */
.grid{display:grid;gap:12px}
.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.hero-grid{grid-template-columns:1.3fr 1fr 1fr;gap:12px}
@media(max-width:1100px){.hero-grid{grid-template-columns:1fr 1fr}}
@media(max-width:720px){
  .hero-grid,.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}
}

/* ---------- Hero: next meet countdown ---------- */
.hero-meet{
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at top right, var(--accent-soft), transparent 55%),
    linear-gradient(180deg,var(--bg-1),var(--bg));
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:22px;
  min-height:220px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.hero-meet::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,transparent 60%, rgba(255,77,46,.06));
}
.hero-label{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;
  color:var(--accent);
}
.hero-label::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;
}
@keyframes pulse{50%{opacity:.3}}
.hero-meet h2{
  font-size:clamp(22px,2.6vw,30px);font-weight:700;letter-spacing:-.03em;
  margin:10px 0 4px;line-height:1.15;
}
.hero-meta{color:var(--fg-3);font-size:12px}
.countdown{
  display:flex;gap:14px;margin-top:16px;
}
.cd-unit{display:flex;flex-direction:column;gap:2px}
.cd-num{
  font-size:32px;font-weight:700;letter-spacing:-.03em;
  font-variant-numeric:tabular-nums;line-height:1;
}
.cd-lbl{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}

/* ---------- Next workout card ---------- */
.next-workout{
  display:flex;flex-direction:column;gap:10px;
}
.nw-head{display:flex;justify-content:space-between;align-items:flex-start}
.nw-date{font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.nw-title{font-size:15px;font-weight:600;margin-top:2px}
.nw-ex{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:6px 0;font-size:12px;border-bottom:1px dashed var(--line);
}
.nw-ex:last-child{border:none}
.nw-ex .name{color:var(--fg-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nw-ex .sets{color:var(--fg-3);font-family:'JetBrains Mono',monospace;font-size:11px}

/* ---------- PR hero cards ---------- */
.pr-big{
  display:flex;flex-direction:column;gap:6px;
  padding:18px;border-radius:var(--radius-lg);
  border:1px solid var(--line);background:var(--bg-1);
  position:relative;overflow:hidden;transition:transform .15s,border-color .12s;
}
.pr-big:hover{border-color:var(--line-2)}
.pr-big::after{
  content:'';position:absolute;right:-20px;bottom:-20px;
  width:110px;height:110px;border-radius:50%;opacity:.08;
  background:currentColor;filter:blur(30px);pointer-events:none;
}
.pr-big.squat{color:var(--squat)}
.pr-big.bench{color:var(--bench)}
.pr-big.deadlift{color:var(--dead)}
.pr-lbl{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.pr-lbl .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.pr-val{
  font-size:38px;font-weight:800;letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;color:var(--fg);line-height:1;margin-top:4px;
}
.pr-val .unit{font-size:16px;font-weight:500;color:var(--fg-3);margin-left:4px}
.pr-meta{font-size:11px;color:var(--fg-3);margin-top:2px}
.pr-spark{height:28px;margin-top:6px;opacity:.7}

/* ---------- Stat rows ---------- */
.stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.stat:last-child{border:none}
.stat-label{font-size:12px;color:var(--fg-3)}
.stat-value{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.stat-value .delta{font-size:11px;margin-left:6px;font-weight:500}
.delta.up{color:var(--ok)}
.delta.down{color:var(--bad)}

/* ---------- Progress chart ---------- */
.chart-wrap{position:relative;width:100%}
.chart-wrap svg{width:100%;height:auto;display:block;overflow:visible}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.chart-legend .li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg-2);cursor:pointer;user-select:none}
.chart-legend .li .swatch{width:10px;height:10px;border-radius:3px}
.chart-legend .li.muted{opacity:.35}

/* ---------- Mezocycle comparison ---------- */
.mezo-compare{display:flex;flex-direction:column;gap:10px}
.mezo-row{display:flex;gap:10px;align-items:center}
.mezo-row .title{min-width:240px;font-size:12px;font-weight:500}
.mezo-row .title .sub{color:var(--fg-3);font-size:11px;display:block}
.mezo-row .bar{flex:1;position:relative;height:22px;background:var(--bg-2);border-radius:5px;overflow:hidden}
.mezo-row .bar-fill{position:absolute;inset:0 auto 0 0;border-radius:5px;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;padding:0 8px;
  font-size:11px;color:#fff;font-weight:600;font-variant-numeric:tabular-nums;
}
.mezo-row .value{min-width:80px;text-align:right;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--fg-2)}

/* ---------- Timeline scrubber ---------- */
.timeline{
  padding:16px 18px 20px;
  background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);
}
.timeline-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.timeline-track{position:relative;height:60px;background:var(--bg-2);border-radius:8px;overflow:hidden;cursor:pointer;user-select:none}
.tl-weeks{position:absolute;inset:0;display:flex}
.tl-week{flex:1;border-right:1px solid var(--line);position:relative}
.tl-week:last-child{border-right:none}
.tl-bar{
  position:absolute;bottom:0;left:10%;right:10%;
  background:var(--accent);border-radius:3px 3px 0 0;
  opacity:.55;transition:opacity .15s,background .15s;
}
.tl-week:hover .tl-bar{opacity:1}
.tl-week.active .tl-bar{opacity:1;background:var(--accent)}
.tl-week.active::after{
  content:'';position:absolute;inset:0;background:rgba(255,77,46,.08);
  border-left:2px solid var(--accent);border-right:2px solid var(--accent);
}
.tl-week-label{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--fg-4);font-family:'JetBrains Mono',monospace;
}
.tl-week.active .tl-week-label{color:var(--accent);font-weight:600}
.tl-detail{
  margin-top:14px;padding:14px;background:var(--bg-2);border-radius:8px;
  display:flex;gap:20px;flex-wrap:wrap;
}
.tl-stat{display:flex;flex-direction:column;gap:2px}
.tl-stat .l{font-size:10px;text-transform:uppercase;color:var(--fg-3);letter-spacing:.08em;font-weight:600}
.tl-stat .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.tl-stat .v.sq{color:var(--squat)}
.tl-stat .v.bn{color:var(--bench)}
.tl-stat .v.dl{color:var(--dead)}

/* ---------- Tables / rows ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--fg-3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
tr.clickable{cursor:pointer;transition:background .08s}
tr.clickable:hover td{background:var(--bg-2)}
tr.open td{background:var(--bg-2)}

/* ---------- Pills ---------- */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;
  background:var(--bg-2);color:var(--fg-2);text-transform:uppercase;letter-spacing:.04em;
}
.pill.squat{background:rgba(255,179,64,.14);color:var(--squat)}
.pill.bench{background:rgba(255,77,46,.14);color:var(--bench)}
.pill.deadlift{background:rgba(191,90,242,.14);color:var(--dead)}
.pill.accessory{background:var(--bg-2);color:var(--fg-3)}
.pill.ok{background:rgba(48,209,88,.14);color:var(--ok)}

/* ---------- Exercise row + hover tooltip ---------- */
.ex-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 12px;border-radius:8px;position:relative;
  transition:background .12s;cursor:pointer;
}
.ex-row:hover{background:var(--bg-2)}
.ex-row .ex-icon{
  width:36px;height:36px;flex-shrink:0;
  border-radius:8px;background:var(--bg-2);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--fg-2);
}
.ex-row:hover .ex-icon{border-color:var(--line-2);color:var(--accent)}
.ex-row .ex-body{flex:1;min-width:0}
.ex-row .ex-name{font-size:13px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ex-row .ex-sets{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg-3);
  max-height:0;overflow:hidden;transition:max-height .3s ease;
}
.ex-row.expanded .ex-sets{max-height:120px;margin-top:6px}
.ex-row .ex-top{font-size:11px;color:var(--fg-3);font-family:'JetBrains Mono',monospace}

.ex-tooltip{
  position:fixed;z-index:1000;pointer-events:none;
  background:var(--bg-1);border:1px solid var(--line-2);
  border-radius:10px;padding:12px;min-width:220px;max-width:280px;
  box-shadow:var(--shadow-lg);
  opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;
}
.ex-tooltip.show{opacity:1;transform:none}
.ex-tooltip svg{width:100%;height:110px;display:block;background:var(--bg-2);border-radius:6px;margin-bottom:8px}
.ex-tooltip .t-name{font-size:13px;font-weight:600;margin-bottom:2px}
.ex-tooltip .t-sub{font-size:11px;color:var(--fg-3)}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:7px;
  font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--line);background:var(--bg-1);color:var(--fg);
  transition:background .1s,border-color .1s;
}
.btn:hover{background:var(--bg-2);border-color:var(--line-2)}
.btn.primary{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 1px 0 rgba(255,255,255,.15) inset;
}
.btn.primary:hover{background:var(--accent-2);border-color:var(--accent-2)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--bad);border-color:var(--line)}
.btn.danger:hover{background:rgba(255,69,58,.1);border-color:var(--bad)}
.btn svg{width:13px;height:13px}

/* ---------- Inputs ---------- */
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--bg-1);color:var(--fg);
  border:1px solid var(--line);border-radius:7px;
  padding:8px 10px;font-size:13px;font-family:inherit;
  transition:border-color .1s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{min-height:180px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;resize:vertical}
label{display:block;font-size:11px;color:var(--fg-3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* ---------- Calendar heatmap ---------- */
.heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--bg-2);transition:transform .1s}
.hm-cell:hover{transform:scale(1.3);z-index:2}
.hm-cell.l1{background:rgba(255,77,46,.25)}
.hm-cell.l2{background:rgba(255,77,46,.45)}
.hm-cell.l3{background:rgba(255,77,46,.7)}
.hm-cell.l4{background:var(--accent)}

/* ---------- Bottom tab bar (mobile) ---------- */
.tabbar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,.85);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
}
[data-theme="light"] .tabbar{background:rgba(250,250,250,.85)}
.tabbar-inner{display:flex;justify-content:space-around;max-width:520px;margin:0 auto}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 4px;border:none;background:none;cursor:pointer;
  color:var(--fg-3);font-size:10px;font-weight:500;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:20px;height:20px}
@media(max-width:900px){
  .tabbar{display:block}
  .sidebar{display:none}
}

/* ---------- Tweaks panel ---------- */
.tweaks{
  position:fixed;right:16px;bottom:16px;z-index:200;
  background:var(--bg-1);border:1px solid var(--line-2);
  border-radius:12px;padding:14px;min-width:260px;
  box-shadow:var(--shadow-lg);display:none;
}
@media(max-width:900px){.tweaks{bottom:80px}}
.tweaks.on{display:block}
.tweaks h4{margin:0 0 10px;font-size:12px;font-weight:600;letter-spacing:-.005em;display:flex;align-items:center;justify-content:space-between}
.tweaks h4 .close{cursor:pointer;color:var(--fg-3);background:none;border:none;font-size:16px;line-height:1}
.tweak-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line)}
.tweak-row:first-of-type{border-top:none}
.tweak-row .lbl{font-size:12px;color:var(--fg-2)}
.seg{display:flex;background:var(--bg-2);border-radius:6px;padding:2px;gap:2px}
.seg button{background:none;border:none;padding:4px 8px;border-radius:4px;font-size:11px;color:var(--fg-3);cursor:pointer}
.seg button.on{background:var(--bg-1);color:var(--fg);box-shadow:var(--shadow-sm)}
.swatches{display:flex;gap:6px}
.sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.sw:hover{transform:scale(1.1)}
.sw.on{border-color:var(--fg)}

/* ---------- Toast ---------- */
.toast{
  position:fixed;right:16px;bottom:16px;z-index:500;
  background:var(--bg-1);border:1px solid var(--line-2);
  padding:10px 14px;border-radius:10px;font-size:13px;
  box-shadow:var(--shadow-lg);
  transform:translateY(20px);opacity:0;pointer-events:none;
  transition:transform .2s,opacity .2s;
}
@media(max-width:900px){.toast{bottom:80px}}
.toast.show{transform:none;opacity:1}
.toast.ok{border-color:var(--ok)}
.toast.err{border-color:var(--bad)}

/* ---------- Misc ---------- */
.empty{padding:40px;text-align:center;color:var(--fg-3);font-size:13px}
.divider{height:1px;background:var(--line);margin:16px 0}
.kbd{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:1px 5px;border:1px solid var(--line);border-radius:4px;
  background:var(--bg-2);color:var(--fg-2);
}
details.accordion{border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;background:var(--bg-1)}
details.accordion[open]{border-color:var(--line-2)}
details.accordion summary{cursor:pointer;font-size:13px;font-weight:500;list-style:none;display:flex;align-items:center;gap:8px}
details.accordion summary::-webkit-details-marker{display:none}
details.accordion summary::before{
  content:'›';display:inline-block;transition:transform .15s;color:var(--fg-3);font-size:16px;line-height:1;
}
details.accordion[open] summary::before{transform:rotate(90deg);color:var(--accent)}
.meta{color:var(--fg-3);font-size:12px}

.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:6px}
.scroll-x::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}

/* compact view on mobile */
@media(max-width:720px){

  .mezo-row{flex-wrap:wrap}
  .mezo-row .title{min-width:100%}
  .mezo-row .value{min-width:60px}
}

<script>
/* Рекорд — powerlifting journal
   App logic: uses window.HISTORY, window.MEETS, window.STRUCTURE from data.js */

const $ = (q,r=document)=>r.querySelector(q);
const $$ = (q,r=document)=>[...r.querySelectorAll(q)];
const H = window.HISTORY || [];
const MEETS = window.MEETS || [];
const STRUCT = window.STRUCTURE || [];

const RU = { squat:'Присед', bench:'Жим', deadlift:'Тяга' };
const pad = n => String(n).padStart(2,'0');
const fmtDate = d => { const dt = new Date(d); return dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtShort = d => { const dt = new Date(d); return dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}); };
const daysBetween = (a,b)=> Math.round((new Date(b)-new Date(a))/86400000);
const todayISO = new Date().toISOString().slice(0,10);
const round25 = w => Math.round(w/2.5)*2.5;
const epley = (w,r) => r<=1?w:+(w*(1+r/30)).toFixed(1);

/* ========================= State & router ========================= */
const state = {
  route: localStorage.getItem('route') || 'dashboard',
  selectedPrepIdx: 0,
  selectedWeekIdx: 0,
};

function go(route){
  state.route = route;
  localStorage.setItem('route', route);
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.go===route));
  $$('.tab-btn').forEach(n => n.classList.toggle('active', n.dataset.go===route));
  const titles = {dashboard:'Сводка',add:'Записать',plan:'План к старту',history:'История',records:'Рекорды',mezo:'Мезоциклы',settings:'Настройки'};
  $('#crumb-leaf').textContent = titles[route]||'';
  render();
}

/* ========================= Domain helpers ========================= */
// Extract main lift from name
const ACC_RE = /вертикальн|горизонтальн|(?<!становая\s)блок|гантел|резин|гриф\s*\d|грудь\s+сидя|хаммер|бабочк|разгибани|гоблет|пуловер|фейспул|тяга\s+рез|тяга\s+блок|тяга\s+вертик|тяга\s+горизонт|тяга\s+в\s+наклон|подтягиван|отведен|разведен|румын|мёрт\s*тяг|мерт\s*тяг|жим\s+ногами|жим\s+ногой|жим\s+сидя\s+(?!штанги)|плат(ф|ф\s)|^жим\s+ст(оя|оп)/i;
function detectMain(name){
  if(!name) return null;
  if(ACC_RE.test(name)) return null;
  if(/прис[её]д/i.test(name)) return 'squat';
  if(/жим/i.test(name)){
    if(/гантел|хаммер/i.test(name)) return null;
    if(/л[её]ж|соревноват|штанги|обычн|на\s+полу|в\s+раме|с\s+паузой|с\s+цеп|узким|сидя\s+штанги/i.test(name)) return 'bench';
  }
  if(/тяга|становая/i.test(name)){
    if(/становая|соревноват|классик|сумо|с\s+плинт|с\s+ямы|с\s+пола|в\s+пауэр/i.test(name)) return 'deadlift';
  }
  return null;
}

function sortedHistory(){ return [...H].sort((a,b)=>a.d.localeCompare(b.d)); }

// Gym max per lift across all history (weight with reps>=1)
function gymPRs(){
  const all = sortedHistory();
  const prs = {};
  for (const w of all){
    for (const e of (w.ex||[])){
      const m = e.m || detectMain(e.n||e.cn);
      if(!m) continue;
      for(const s of (e.s||[])){
        if(!s.w) continue;
        if(!prs[m] || s.w > prs[m].w) prs[m] = { w:s.w, r:s.r, d:w.d, e1rm: epley(s.w, s.r||1) };
      }
    }
  }
  // blend in meet PRs
  for(const m of MEETS){
    for(const l of ['squat','bench','deadlift']){
      if(m[l] && (!prs[l] || m[l] > prs[l].w)) prs[l] = { w:m[l], r:1, d:m.date, meet:m.name, e1rm:m[l] };
    }
  }
  return prs;
}

// Next meet in the future (or the most recent if none)
function nextMeet(){
  const future = MEETS.filter(m => m.date >= todayISO).sort((a,b)=>a.date.localeCompare(b.date));
  if(future.length) return future[0];
  const past = [...MEETS].sort((a,b)=>b.date.localeCompare(a.date));
  return past[0];
}

// Next planned workout = last logged date (simulated "today" for realism)
function lastSession(){
  const sorted = sortedHistory();
  return sorted[sorted.length-1];
}

// Monthly aggregated top weight per main lift
function monthlyMax(){
  const all = sortedHistory();
  const buckets = {}; // ym -> { squat, bench, deadlift }
  for (const w of all){
    const ym = w.d.slice(0,7);
    buckets[ym] ||= { squat:0, bench:0, deadlift:0 };
    for (const e of (w.ex||[])){
      const m = e.m || detectMain(e.n||e.cn);
      if(!m) continue;
      for(const s of (e.s||[])){
        if(!s.w) continue;
        if(s.w > buckets[ym][m]) buckets[ym][m] = s.w;
      }
    }
  }
  const out = Object.keys(buckets).sort().map(k => ({ ym:k, ...buckets[k] }));
  return out;
}

// Weekly tonnage per main lift for current (latest) prep / cycle
function tonnageByWeek(prep){
  if(!prep) return [];
  return (prep.cycles||[]).flatMap(c => (c.weeks||[])).map(week=>{
    const t = {squat:0,bench:0,deadlift:0};
    for(const d of (week.days||[])){
      for(const e of (d.ex||[])){
        const m = e.m || detectMain(e.n||e.cn);
        if(!m) continue;
        for(const s of (e.s||[])) if(s.w) t[m]+= s.w*s.r;
      }
    }
    return { start:week.start, end:week.end, ...t, total:t.squat+t.bench+t.deadlift };
  });
}

// For comparison: each prep = { title, result, squat_peak, bench_peak, deadlift_peak, total_peak, n_weeks }
function prepSummaries(){
  return STRUCT.map(p => {
    let sq=0,bn=0,dl=0;
    let totalVol=0;
    let sessions=0;
    for(const c of (p.cycles||[])){
      for(const wk of (c.weeks||[])){
        for(const d of (wk.days||[])){
          sessions++;
          for(const e of (d.ex||[])){
            const m = e.m || detectMain(e.n||e.cn);
            for(const s of (e.s||[])){
              if(!s.w) continue;
              if(m==='squat' && s.w>sq) sq=s.w;
              if(m==='bench' && s.w>bn) bn=s.w;
              if(m==='deadlift' && s.w>dl) dl=s.w;
              if(m) totalVol += s.w*s.r;
            }
          }
        }
      }
    }
    return { ...p, peak_s:sq, peak_b:bn, peak_d:dl, tonnage:totalVol, sessions };
  });
}

/* ========================= Sparkline & charts ========================= */
function sparkline(values, color='currentColor', w=140, h=28){
  if(!values.length) return `<svg viewBox="0 0 ${w} ${h}"></svg>`;
  const vs = values.filter(v=>v>0);
  if(!vs.length) return `<svg viewBox="0 0 ${w} ${h}"></svg>`;
  const min = Math.min(...vs), max = Math.max(...vs), range = Math.max(1, max-min);
  const step = w / Math.max(1,values.length-1);
  let d = '';
  values.forEach((v,i)=>{
    if(!v){d += ''; return;}
    const x = i*step;
    const y = h - ((v-min)/range)*(h-2) - 1;
    d += (d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  });
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function progressChart(){
  const data = monthlyMax();
  if(!data.length) return '';
  const w = 800, h = 240, pad = { l:40, r:12, t:12, b:28 };
  const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
  const lifts = [
    { key:'squat', color:'var(--squat)', label:'Присед' },
    { key:'bench', color:'var(--bench)', label:'Жим' },
    { key:'deadlift', color:'var(--dead)', label:'Тяга' },
  ];
  const allVals = data.flatMap(d=>[d.squat,d.bench,d.deadlift]).filter(v=>v>0);
  const max = Math.ceil(Math.max(...allVals, 1)/25)*25;
  const x = i => pad.l + (i/(data.length-1||1))*iw;
  const y = v => pad.t + ih - (v/max)*ih;

  // grid
  const gridLines = [0.25,0.5,0.75,1].map(p=>{
    const yp = pad.t + ih*(1-p);
    return `<line x1="${pad.l}" x2="${w-pad.r}" y1="${yp}" y2="${yp}" stroke="var(--line)" stroke-dasharray="2 4"/>
    <text x="${pad.l-6}" y="${yp+3}" text-anchor="end" fill="var(--fg-3)" font-size="10" font-family="JetBrains Mono">${Math.round(max*p)}</text>`;
  }).join('');

  const paths = lifts.map(l=>{
    let d='';
    data.forEach((pt,i)=>{
      if(pt[l.key] > 0){ d += (d?'L':'M')+x(i)+' '+y(pt[l.key]); }
    });
    return `<path d="${d}" fill="none" stroke="${l.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="line-${l.key}"/>`;
  }).join('');

  // x labels — every ~6th month
  const stepLbl = Math.max(1, Math.floor(data.length/8));
  const xLabels = data.map((pt,i)=> i%stepLbl===0
    ? `<text x="${x(i)}" y="${h-6}" text-anchor="middle" fill="var(--fg-3)" font-size="10" font-family="JetBrains Mono">${pt.ym.slice(2).replace('-','·')}</text>`
    : ''
  ).join('');

  // meet markers
  const meetMarks = MEETS.map(m=>{
    const mym = m.date.slice(0,7);
    const idx = data.findIndex(d=>d.ym===mym);
    if(idx<0) return '';
    return `<line x1="${x(idx)}" x2="${x(idx)}" y1="${pad.t}" y2="${h-pad.b}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
      <circle cx="${x(idx)}" cy="${pad.t+4}" r="3" fill="var(--accent)"><title>${m.date} · ${m.name}</title></circle>`;
  }).join('');

  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${w} ${h}">
      ${gridLines}${meetMarks}${paths}${xLabels}
    </svg>
    <div class="chart-legend">
      ${lifts.map(l=>`<div class="li" data-lift="${l.key}"><span class="swatch" style="background:${l.color}"></span>${l.label}</div>`).join('')}
      <div class="li" style="color:var(--fg-3)"><span class="swatch" style="background:var(--accent)"></span>Старты</div>
    </div>
  </div>`;
}

function renderTimeline(weeks){
  const track = $('#tl-track');
  const detail = $('#tl-detail');
  if(!track) return;
  // compute tonnage per week
  const tonnages = weeks.map(week=>{
    const t = {squat:0,bench:0,deadlift:0};
    for(const d of (week.days||[])){
      for(const e of (d.ex||[])){
        const m = e.m || detectMain(e.n||e.cn);
        if(!m) continue;
        for(const s of (e.s||[])) if(s.w) t[m]+=s.w*s.r;
      }
    }
    return { ...week, ...t, total:t.squat+t.bench+t.deadlift };
  });
  const maxT = Math.max(1, ...tonnages.map(t=>t.total));

  track.innerHTML = tonnages.map((w,i)=>{
    const h = 6 + (w.total/maxT)*90;
    return `<div class="tl-week ${i===state.selectedWeekIdx?'active':''}" data-i="${i}">
      <div class="tl-bar" style="height:${h}%"></div>
      <div class="tl-week-label">${i+1}</div>
    </div>`;
  }).join('');

  function showDetail(i){
    const w = tonnages[i];
    if(!w){detail.innerHTML='';return}
    detail.innerHTML = `
      <div class="tl-stat"><div class="l">Неделя ${i+1} из ${tonnages.length}</div><div class="v mono" style="font-size:14px">${w.start} — ${w.end||'…'}</div></div>
      <div class="tl-stat"><div class="l">Тоннаж</div><div class="v mono">${(w.total/1000).toFixed(1)}<span style="font-size:11px;color:var(--fg-3)"> т</span></div></div>
      <div class="tl-stat"><div class="l">Присед</div><div class="v sq mono">${Math.round(w.squat)}</div></div>
      <div class="tl-stat"><div class="l">Жим</div><div class="v bn mono">${Math.round(w.bench)}</div></div>
      <div class="tl-stat"><div class="l">Тяга</div><div class="v dl mono">${Math.round(w.deadlift)}</div></div>
      <div class="tl-stat"><div class="l">Тренировок</div><div class="v mono" style="font-size:18px">${(w.days||[]).length}</div></div>
    `;
  }
  showDetail(state.selectedWeekIdx);

  $$('.tl-week', track).forEach(el=>{
    el.addEventListener('click', ()=>{
      state.selectedWeekIdx = +el.dataset.i;
      $$('.tl-week', track).forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      showDetail(state.selectedWeekIdx);
    });
    el.addEventListener('mouseenter', ()=>{
      showDetail(+el.dataset.i);
    });
  });
  track.addEventListener('mouseleave', ()=> showDetail(state.selectedWeekIdx));
}

function renderHeatmap(){

  // last 53 weeks
  const end = new Date(todayISO);
  const start = new Date(end); start.setDate(start.getDate() - 53*7);
  const daysMap = {};
  for(const w of H){
    daysMap[w.d] = (daysMap[w.d]||0) + (w.ex||[]).reduce((a,e)=>a+((e.s||[]).length),0);
  }
  // Build columns (weeks) × 7 rows
  const cells = [];
  const iter = new Date(start);
  while(iter <= end){
    const iso = iter.toISOString().slice(0,10);
    const c = daysMap[iso]||0;
    const lvl = c===0?0: c<10?1: c<20?2: c<30?3:4;
    cells.push(`<div class="hm-cell ${lvl?'l'+lvl:''}" title="${iso}: ${c} подходов"></div>`);
    iter.setDate(iter.getDate()+1);
  }
  wrap.innerHTML = `<div style="display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:minmax(8px,1fr);gap:2px">${cells.join('')}</div>
  <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--fg-3)"><span>${start.toLocaleDateString('ru-RU',{month:'short',year:'2-digit'})}</span><span>Сегодня</span></div>`;
}

/* ========================= Mezo comparison ========================= */
function renderMezo(){
  const preps = prepSummaries().filter(p=>p.peak_s||p.peak_b||p.peak_d);
  const maxTotal = Math.max(...preps.map(p=>(p.peak_s+p.peak_b+p.peak_d)), 1);
  const maxTonn = Math.max(...preps.map(p=>p.tonnage), 1);

  const rows = (key, color, pick) => `
    <div class="mezo-compare" style="margin-top:12px">
    ${preps.map(p => {
      const val = pick(p);
      const pct = Math.round((val / (key==='tonn'?maxTonn:maxTotal))*100);
      return `<div class="mezo-row">
        <div class="title">${p.title.split('·').slice(-2).join(' · ')}<span class="sub">${p.n_weeks} нед · ${p.sessions} трен · ${fmtShort(p.start)} → ${fmtShort(p.end)}</span></div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;${color?'background:'+color:''}">${pct}%</div></div>
        <div class="value mono">${key==='tonn'? (val/1000).toFixed(1)+' т' : val+' кг'}</div>
      </div>`;
    }).join('')}
    </div>
  `;

  $('#content').innerHTML = `
    <div class="page-head">
      <h1 class="page-title">Мезоциклы</h1>
      <div class="page-sub">Сравнение всех подготовок между собой: пиковые веса, тоннаж, длина.</div>
    </div>

    <div class="grid cols-2">
      <div class="card">
        <div class="card-head"><div>
          <div class="card-title">Пиковый SBD-сум</div>
          <div class="meta">Сумма пиковых весов в зале по каждому движению</div>
        </div></div>
        ${rows('total', 'linear-gradient(90deg,var(--bench),var(--accent-2))', p=>p.peak_s+p.peak_b+p.peak_d)}
      </div>
      <div class="card">
        <div class="card-head"><div>
          <div class="card-title">Общий тоннаж подготовки</div>
          <div class="meta">Сумма весов × повторы на основных движениях</div>
        </div></div>
        ${rows('tonn', 'linear-gradient(90deg,var(--dead),var(--bench))', p=>p.tonnage)}
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-head"><div class="card-title">По движениям отдельно</div></div>
      <div class="grid cols-3" style="margin-top:8px">
        ${[
          {k:'peak_s',title:'🦵 Присед',c:'var(--squat)'},
          {k:'peak_b',title:'🛋 Жим',c:'var(--bench)'},
          {k:'peak_d',title:'💪 Тяга',c:'var(--dead)'},
        ].map(l=>{
          const vmax = Math.max(1, ...preps.map(p=>p[l.k]));
          return `<div>
            <div class="card-sub" style="margin-bottom:10px;color:${l.c}">${l.title}</div>
            ${preps.map(p=>{
              const v = p[l.k]; const pct = Math.round(v/vmax*100);
              return `<div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--fg-3);margin-bottom:3px"><span>${fmtShort(p.meet?.date||p.end)}</span><span class="mono" style="color:var(--fg)">${v||'—'} кг</span></div>
                <div style="height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${l.c};border-radius:3px"></div></div>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

/* ========================= History ========================= */
function renderHistory(){
  const preps = STRUCT;
  state.selectedPrepIdx = Math.min(state.selectedPrepIdx, preps.length-1);
  const prep = preps[state.selectedPrepIdx] || preps[preps.length-1];

  $('#content').innerHTML = `
    <div class="page-head">
      <h1 class="page-title">История</h1>
      <div class="page-sub">Группировка: подготовка → цикл → неделя → день.</div>
    </div>

    <div class="card" style="padding:12px">
      <div class="scroll-x">
        <div style="display:flex;gap:6px;min-width:max-content" id="prep-tabs">
          ${preps.map((p,i)=>`
            <button class="btn ${i===state.selectedPrepIdx?'primary':''}" data-i="${i}" style="font-size:12px">
              ${p.title.split('·')[1]?.trim()||p.title.slice(0,24)} · ${p.end.slice(2,7)}
            </button>
          `).join('')}
        </div>
      </div>
    </div>

    <div style="margin-top:14px" id="prep-detail"></div>
  `;

  const renderPrep = () => {
    const p = preps[state.selectedPrepIdx];
    if(!p){ $('#prep-detail').innerHTML = '<div class="empty">Нет данных</div>'; return; }
    const resultIcons = (() => {
      const r = p.meet||{};
      return `${r.squat?`<span class="pill squat">П ${r.squat}</span>`:''} ${r.bench?`<span class="pill bench">Ж ${r.bench}</span>`:''} ${r.deadlift?`<span class="pill deadlift">Т ${r.deadlift}</span>`:''}`;
    })();

    $('#prep-detail').innerHTML = `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${p.title}</div>
            <div class="meta">${fmtDate(p.start)} — ${fmtDate(p.end)} · ${p.n_weeks} недель · результат: ${resultIcons||p.result||'—'}</div>
          </div>
        </div>
      </div>
      ${(p.cycles||[]).map(c=>`
        <details class="accordion" ${c.i===p.cycles.length?'open':''} style="margin-top:10px">
          <summary><b>Цикл ${c.i}</b><span class="meta" style="margin-left:auto">${fmtShort(c.start)} — ${fmtShort(c.end)} · ${c.nw} нед · ${c.nd} трен/нед</span></summary>
          <div style="margin-top:10px">
            ${(c.weeks||[]).map((wk,wi)=>`
              <details class="accordion">
                <summary>Неделя ${wi+1} <span class="meta" style="margin-left:auto">${fmtShort(wk.start)} → ${fmtShort(wk.end||wk.start)} · ${(wk.days||[]).length} трен</span></summary>
                <div style="margin-top:8px">
                  ${(wk.days||[]).map(d=>`
                    <div style="padding:10px 0;border-top:1px solid var(--line)">
                      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                        <span class="mono" style="color:var(--fg-2);font-size:12px">${d.d}</span>
                        <span class="pill">${d.lbl||d.t}</span>
                      </div>
                      ${(d.ex||[]).filter(e=>!e.h).map(e=>{
                        const m = e.m || detectMain(e.n||e.cn);
                        const setsStr = (e.s||[]).map(s => s.w?`${s.w}×${s.r}`:`—×${s.r}`).join(' · ') || '—';
                        return `<div class="ex-row" data-ex-name="${(e.n||e.cn||'').replace(/"/g,'&quot;')}" data-ex-kind="${iconKindFor(e.n||e.cn||'')}">
                          <div class="ex-icon">${liftIcon(iconKindFor(e.n||e.cn||''))}</div>
                          <div class="ex-body">
                            <div class="ex-name">${m?`<span class="pill ${m}">${RU[m]}</span>`:''}${e.n||e.cn||''}</div>
                            <div class="ex-top">${setsStr}</div>
                          </div>
                        </div>`;
                      }).join('')}
                    </div>
                  `).join('')}
                </div>
              </details>
            `).join('')}
          </div>
        </details>
      `).join('')}
    `;

    // attach hover tooltips
    $$('.ex-row', $('#prep-detail')).forEach(el=>{
      el.addEventListener('mouseenter', e => showExTooltip(el, el.dataset.exName, el.dataset.exKind));
      el.addEventListener('mousemove', e => moveExTooltip(e));
      el.addEventListener('mouseleave', hideExTooltip);
      el.addEventListener('click', () => el.classList.toggle('expanded'));
    });
  };

  $$('#prep-tabs .btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.selectedPrepIdx = +b.dataset.i;
      $$('#prep-tabs .btn').forEach(x=>x.classList.toggle('primary', x===b));
      renderPrep();
    });
  });
  renderPrep();
}

/* ========================= Tooltip ========================= */
const tipEl = ()=>$('#ex-tooltip');
function showExTooltip(el, name, kind){
  const t = tipEl();
  const main = detectMain(name);
  const color = main==='squat'?'var(--squat)': main==='bench'?'var(--bench)': main==='deadlift'?'var(--dead)':'var(--fg-2)';
  t.innerHTML = `${liftIcon(kind, color)}
    <div class="t-name">${name}</div>
    <div class="t-sub">${main?RU[main]+' — основное':'подсобка'}</div>`;
  t.classList.add('show');
}
function moveExTooltip(e){
  const t = tipEl();
  const x = Math.min(window.innerWidth - 300, e.clientX + 16);
  const y = Math.min(window.innerHeight - 200, e.clientY + 16);
  t.style.left = x+'px';
  t.style.top = y+'px';
}
function hideExTooltip(){ tipEl().classList.remove('show'); }

/* ========================= Router ========================= */
function render(){
  const r = state.route;
  if(r==='dashboard') renderDashboard();
  else if(r==='add') renderAdd();
  else if(r==='plan') renderPlan();
  else if(r==='history') renderHistory();
  else if(r==='records') renderRecords();
  else if(r==='mezo') renderMezo();
  else if(r==='settings') renderSettings();
  else renderDashboard();
}

/* ========================= Boot ========================= */
document.addEventListener('DOMContentLoaded', () => {
  $$('[data-go]').forEach(b => b.addEventListener('click', ()=>go(b.dataset.go)));
  go(state.route);

  // tweaks
  $('#btn-tweaks-toggle').addEventListener('click', () => $('#tweaks').classList.toggle('on'));
  $('#tweaks-close').addEventListener('click', () => $('#tweaks').classList.remove('on'));
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  $$('#seg-theme button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===savedTheme);
    b.addEventListener('click', ()=>{
      $$('#seg-theme button').forEach(x=>x.classList.toggle('on', x===b));
      document.documentElement.setAttribute('data-theme', b.dataset.v);
      localStorage.setItem('theme', b.dataset.v);
    });
  });
  const savedAcc = localStorage.getItem('accent') || '#ff4d2e';
  document.documentElement.style.setProperty('--accent', savedAcc);
  $$('#sw-accent .sw').forEach(b=>{
    b.classList.toggle('on', b.dataset.a===savedAcc);
    b.addEventListener('click', ()=>{
      $$('#sw-accent .sw').forEach(x=>x.classList.toggle('on', x===b));
      document.documentElement.style.setProperty('--accent', b.dataset.a);
      localStorage.setItem('accent', b.dataset.a);
    });
  });
});
